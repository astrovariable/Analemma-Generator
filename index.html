<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Analemma Generator</title>

<style>

body{
font-family:Arial;
max-width:900px;
margin:auto;
padding:20px;
}

input{
margin:5px;
padding:6px;
}

button{
padding:8px 14px;
margin-top:10px;
}

.result{
margin-top:20px;
font-size:18px;
}

canvas{
border:1px solid black;
margin-top:20px;
}

</style>

</head>

<body>

<h2>Analemma Generator</h2>

<label>Latitude (°)</label><br> <input id="lat" type="number" step="0.01" value="23"><br>

<label>Longitude (°)</label><br> <input id="lon" type="number" step="0.01" value="72"><br>

<label>Date</label><br> <input id="date" type="date"><br>

<label>Time (IST)</label><br> <input id="time" type="time"><br>

<label>Gnomon Height (cm)</label><br> <input id="height" type="number" value="20"><br>

<br>

<button onclick="calculate()">Calculate Shadow</button> <button onclick="findObservationWindow()">Observation Window</button> <button onclick="drawBoard()">Draw Board</button> <button onclick="plotDailyShadow()">Daily Shadow Path</button> <button onclick="plotAnalemma()">Plot Analemma</button>

<div class="result" id="output"></div>

<canvas id="boardCanvas" width="500" height="400"></canvas>

<script>

function dayOfYear(date){
let start=new Date(date.getFullYear(),0,0);
let diff=date-start;
let oneDay=1000*60*60*24;
return Math.floor(diff/oneDay);
}

function solarPosition(lat,lon,date,IST){

let N = dayOfYear(date);

let gamma = 2*Math.PI/365 * (N - 1 + (IST - 12)/24);

let EoT =
229.18 * (
0.000075
+ 0.001868 * Math.cos(gamma)
- 0.032077 * Math.sin(gamma)
- 0.014615 * Math.cos(2*gamma)
- 0.040849 * Math.sin(2*gamma)
);

let dec =
0.006918
- 0.399912 * Math.cos(gamma)
+ 0.070257 * Math.sin(gamma)
- 0.006758 * Math.cos(2*gamma)
+ 0.000907 * Math.sin(2*gamma)
- 0.002697 * Math.cos(3*gamma)
+ 0.00148 * Math.sin(3*gamma);

let timeOffset = EoT + 4*(lon - 82.5);

let tst = IST*60 + timeOffset;

let H = tst/4 - 180;

let h = H * Math.PI/180;

let phi = lat * Math.PI/180;

let sinAlt =
Math.sin(phi)*Math.sin(dec) +
Math.cos(phi)*Math.cos(dec)*Math.cos(h);

let alt = Math.asin(sinAlt);

let cosAz =
(Math.sin(dec) - Math.sin(alt)*Math.sin(phi)) /
(Math.cos(alt)*Math.cos(phi));

let az = Math.acos(cosAz);

if(H > 0) az = 2*Math.PI - az;

return {alt:alt, az:az};

}

function calculate(){

let lat=parseFloat(latInput.value);
let lon=parseFloat(lonInput.value);
let height=parseFloat(heightInput.value);

let dateStr=dateInput.value;
let timeStr=timeInput.value;

if(!dateStr||!timeStr){
output.innerHTML="Enter date and time";
return;
}

let d=new Date(dateStr);

let t=timeStr.split(":");

let IST=parseFloat(t[0])+parseFloat(t[1])/60;

let pos=solarPosition(lat,lon,d,IST);

let alt=pos.alt*180/Math.PI;

if(alt<=0){
output.innerHTML="Sun below horizon";
return;
}

let shadow=height/Math.tan(pos.alt);

output.innerHTML=

"<b>Solar Altitude:</b> "+
alt.toFixed(2)+"°<br><br>"+

"<b>Shadow Length:</b> "+
shadow.toFixed(2)+" cm";

}

function drawBoard(){

let canvas=document.getElementById("boardCanvas");
let ctx=canvas.getContext("2d");

ctx.clearRect(0,0,500,400);

let scale=10;

let boardW=21*scale;
let boardH=29.7*scale;

let originX=100;
let originY=100;

ctx.strokeRect(originX,originY,boardW,boardH);

let gx=originX+14*scale;
let gy=originY+19.8*scale;

ctx.fillStyle="red";
ctx.beginPath();
ctx.arc(gx,gy,5,0,2*Math.PI);
ctx.fill();

}

function plotDailyShadow(){

drawBoard();

let lat=parseFloat(latInput.value);
let lon=parseFloat(lonInput.value);
let height=parseFloat(heightInput.value);

let dateStr=dateInput.value;

if(!dateStr)return;

let d=new Date(dateStr);

let canvas=document.getElementById("boardCanvas");
let ctx=canvas.getContext("2d");

let scale=10;

let originX=100;
let originY=100;

let gx=originX+14*scale;
let gy=originY+19.8*scale;

ctx.strokeStyle="blue";

ctx.beginPath();

for(let t=6*60;t<=18*60;t+=5){

let hour=Math.floor(t/60);
let minute=t%60;

let IST=hour+minute/60;

let pos=solarPosition(lat,lon,d,IST);

if(pos.alt<=0)continue;

let L=height/Math.tan(pos.alt);

let saz=pos.az+Math.PI;

let x=L*Math.sin(saz);
let y=L*Math.cos(saz);

let px=gx+x*scale;
let py=gy-y*scale;

ctx.lineTo(px,py);

}

ctx.stroke();

}

function plotAnalemma(){

drawBoard();

let lat=parseFloat(latInput.value);
let lon=parseFloat(lonInput.value);
let height=parseFloat(heightInput.value);

let timeStr=timeInput.value;

if(!timeStr)return;

let t=timeStr.split(":");

let IST=parseFloat(t[0])+parseFloat(t[1])/60;

let canvas=document.getElementById("boardCanvas");
let ctx=canvas.getContext("2d");

let scale=10;

let originX=100;
let originY=100;

let gx=originX+14*scale;
let gy=originY+19.8*scale;

ctx.fillStyle="green";

for(let N=1;N<=365;N++){

let d=new Date(2026,0);
d.setDate(N);

let pos=solarPosition(lat,lon,d,IST);

if(pos.alt<=0)continue;

let L=height/Math.tan(pos.alt);

let saz=pos.az+Math.PI;

let x=L*Math.sin(saz);
let y=L*Math.cos(saz);

let px=gx+x*scale;
let py=gy-y*scale;

ctx.beginPath();
ctx.arc(px,py,2,0,2*Math.PI);
ctx.fill();

}

}

function findObservationWindow(){

let lat=parseFloat(latInput.value);
let lon=parseFloat(lonInput.value);
let height=parseFloat(heightInput.value);

let dateStr=dateInput.value;

if(!dateStr)return;

let d=new Date(dateStr);

let boardX=21;
let boardY=29.7;

let gx=14;
let gy=19.8;

let start=null;
let end=null;

for(let t=6*60;t<=18*60;t++){

let hour=Math.floor(t/60);
let minute=t%60;

let IST=hour+minute/60;

let pos=solarPosition(lat,lon,d,IST);

if(pos.alt<=0)continue;

let L=height/Math.tan(pos.alt);

let saz=pos.az+Math.PI;

let x=gx+L*Math.sin(saz);
let y=gy+L*Math.cos(saz);

if(x>=0 && x<=boardX && y>=0 && y<=boardY){

if(start===null)start=t;

end=t;

}

}

if(start===null){
output.innerHTML="Shadow never fully inside board.";
return;
}

let sh=Math.floor(start/60);
let sm=start%60;

let eh=Math.floor(end/60);
let em=end%60;

output.innerHTML=

"<b>Observation Window</b><br><br>"+

sh+":"+sm.toString().padStart(2,"0")+" → "+
eh+":"+em.toString().padStart(2,"0");

}

let latInput=document.getElementById("lat");
let lonInput=document.getElementById("lon");
let dateInput=document.getElementById("date");
let timeInput=document.getElementById("time");
let heightInput=document.getElementById("height");
let output=document.getElementById("output");

</script>

</body>
</html>
